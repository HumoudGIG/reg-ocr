<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REG·OCR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --line: #2a2d35;
    --text: #e8eaf0;
    --muted: #7a7f8e;
    --green: #22c97a;
    --amber: #f59e0b;
    --red: #ef4444;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); }
  .app { height: 100vh; display: grid; grid-template-columns: 55% 45%; }

  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .image-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 16px;
    overflow: hidden;
    cursor: pointer;
  }
  .image-wrap.empty { cursor: default; }
  #card-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }
  #card-img.visible { display: block; }
  .drop-hint {
    text-align: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    line-height: 1.8;
  }
  .drop-hint strong { color: var(--text); font-size: 13px; }
  .left-footer {
    border-top: 1px solid var(--line);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
  }
  .btn {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn:hover { color: var(--text); border-color: var(--muted); }
  #file-input { display: none; }

  .right-panel {
    background: var(--surface);
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
    position: relative;
  }
  .right-header {
    border-bottom: 1px solid var(--line);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .head-title {
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.06em;
  }
  .head-sub {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
    font-family: var(--font-mono);
  }
  .gear-btn {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.18s;
  }
  .gear-btn:hover { color: var(--text); border-color: var(--muted); }

  .fields {
    overflow-y: auto;
    min-height: 0;
  }
  .field-row {
    display: grid;
    grid-template-columns: 62px 1fr 150px 28px;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    transition: background 0.2s;
  }
  .field-row.flash { animation: rowFlash 1s ease; }
  @keyframes rowFlash {
    0% { background: rgba(245,158,11,0.2); }
    100% { background: transparent; }
  }
  .badge {
    justify-self: start;
    min-width: 48px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
  }
  .badge.green { background: rgba(34,201,122,0.14); color: var(--green); }
  .badge.amber { background: rgba(245,158,11,0.16); color: var(--amber); }
  .badge.red { background: rgba(239,68,68,0.16); color: var(--red); }

  .value-wrap { position: relative; }
  .value-input {
    width: 100%;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 7px 8px;
    transition: all 0.2s;
  }
  .value-input::placeholder { color: var(--muted); }
  .value-input:focus {
    outline: none;
    background: var(--surface2);
  }
  .value-input.green { border-left-color: var(--green); }
  .value-input.amber { border-left-color: var(--amber); }
  .value-input.red { border-left-color: var(--red); }
  .value-input.red.pulse { animation: pulseRed 1.3s infinite; }
  @keyframes pulseRed {
    0% { border-left-color: rgba(239,68,68,0.5); }
    50% { border-left-color: rgba(239,68,68,1); }
    100% { border-left-color: rgba(239,68,68,0.5); }
  }

  .field-label {
    text-align: right;
    direction: rtl;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font-sans);
    white-space: nowrap;
  }
  .copy-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    width: 24px;
    height: 24px;
    transition: all 0.18s;
  }
  .copy-btn:hover { color: var(--text); background: var(--surface2); }
  .copy-btn.copied { color: var(--green); }

  .right-footer {
    border-top: 1px solid var(--line);
    padding: 12px;
    display: grid;
    gap: 8px;
  }
  .progress {
    font-family: var(--font-mono);
    color: var(--muted);
    font-size: 11px;
  }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-main {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 9px 8px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-main:hover { background: var(--surface2); }

  .scan-overlay {
    position: absolute;
    inset: 0;
    background: rgba(22,24,28,0.98);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 30;
    padding: 24px;
  }
  .scan-overlay.active { display: flex; }
  .mini-card {
    width: 230px;
    height: 150px;
    border: 1px solid var(--line);
    background: var(--surface2);
    position: relative;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .mini-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.75;
  }
  .scan-line {
    position: absolute;
    left: 0;
    top: -18px;
    width: 100%;
    height: 18px;
    background: rgba(34,201,122,0.24);
    animation: sweep 1.8s linear infinite;
  }
  @keyframes sweep {
    0% { top: -18px; }
    100% { top: 100%; }
  }
  .scan-text {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .modal-overlay, .zoom-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 80;
  }
  .modal-overlay.open, .zoom-overlay.open { display: flex; }
  .modal {
    width: 420px;
    max-width: 90vw;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 22px;
  }
  .modal h2 {
    font-family: var(--font-mono);
    font-size: 14px;
    margin-bottom: 8px;
  }
  .modal p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .modal label {
    display: block;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    margin-bottom: 6px;
  }
  .modal input {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    margin-bottom: 10px;
    font-family: var(--font-mono);
  }
  .modal-actions { display: flex; gap: 8px; }
  .zoom-content {
    width: 94vw;
    height: 94vh;
    background: #000;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #zoom-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .close-zoom {
    position: absolute;
    right: 10px;
    top: 10px;
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.5);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--surface2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    transition: transform 0.2s;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 1100px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 48% 52%; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>
<div class="app">
  <section class="left-panel">
    <div class="image-wrap empty" id="image-wrap" onclick="openPickerIfEmpty()">
      <img id="card-img" alt="Card image">
      <div class="drop-hint" id="drop-hint">
        <strong>Upload Kuwait registration card</strong><br>
        Click to browse or drag and drop<br>
        PNG · JPG · WEBP
      </div>
    </div>
    <div class="left-footer">
      <button class="btn" onclick="newScan()">New scan</button>
      <button class="btn" onclick="runOCR()" id="rescan-btn" style="display:none;">Re-scan</button>
      <input id="file-input" type="file" accept="image/*">
    </div>
  </section>

  <section class="right-panel">
    <header class="right-header">
      <div>
        <div class="head-title">REG·OCR</div>
        <div class="head-sub">Kuwait Vehicle Registration</div>
      </div>
      <button class="gear-btn" onclick="openConfig()" title="API config">⚙</button>
    </header>

    <div class="fields" id="fields"></div>

    <footer class="right-footer">
      <div class="progress" id="progress-text">0/22 fields extracted</div>
      <div class="actions">
        <button class="btn-main" onclick="copyAll()">Copy all</button>
        <button class="btn-main" onclick="exportCSV()">Export CSV</button>
      </div>
    </footer>

    <div class="scan-overlay" id="scan-overlay">
      <div class="mini-card">
        <img id="mini-scan-img" alt="Mini scan image">
        <div class="scan-line"></div>
      </div>
      <div class="scan-text" id="scan-text">Reading document...</div>
    </div>
  </section>
</div>

<div class="modal-overlay" id="config-modal">
  <div class="modal">
    <h2>API Configuration</h2>
    <p>Enter your Anthropic API key. It is stored locally in your browser.</p>
    <label for="api-key">ANTHROPIC API KEY</label>
    <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off">
    <div class="modal-actions">
      <button class="btn-main" onclick="saveConfig()">Save</button>
      <button class="btn-main" onclick="closeConfig()">Cancel</button>
    </div>
  </div>
</div>

<div class="zoom-overlay" id="zoom-overlay" onclick="closeZoomIfOverlay(event)">
  <div class="zoom-content">
    <button class="close-zoom" onclick="closeZoom()">Close</button>
    <img id="zoom-img" alt="Zoom view">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FIELD_DEFS = [
  { key: 'plate_number', ar: 'رقم اللوحة' },
  { key: 'license_type', ar: 'عرض ترخيص' },
  { key: 'owner_id', ar: 'رقم المالك' },
  { key: 'owner_name_arabic', ar: 'الاسم بالعربية', rtl: true },
  { key: 'owner_name_english', ar: 'الاسم بالإنجليزية' },
  { key: 'nationality', ar: 'الجنسية', rtl: true },
  { key: 'reference_number', ar: 'المرجع' },
  { key: 'insurance_company', ar: 'شركة التأمين', rtl: true },
  { key: 'policy_number', ar: 'رقم الوثيقة' },
  { key: 'expiry_date', ar: 'تاريخ الانتهاء' },
  { key: 'chassis_vin', ar: 'رقم القاعدة' },
  { key: 'make', ar: 'الصنع' },
  { key: 'year', ar: 'سنة الصنع' },
  { key: 'model', ar: 'الشكل' },
  { key: 'passengers', ar: 'الركاب' },
  { key: 'color_primary', ar: 'اللون الاول', rtl: true },
  { key: 'color_secondary', ar: 'اللون 2', rtl: true },
  { key: 'weight', ar: 'الوزن' },
  { key: 'load_capacity', ar: 'حمولة' },
  { key: 'height', ar: 'ارتفاع' },
  { key: 'issue_date', ar: 'تاريخ الاصدار' },
  { key: 'card_number', ar: 'رقم البطاقة' }
];

const OCR_PROMPT = "You are an expert OCR engine for Kuwait vehicle registration cards. These cards are bilingual Arabic/English, printed in red and white, and often have a diagonal security watermark pattern and a circular official stamp in the bottom-left corner.\n\nYou know the exact structure of these cards. Extract every field listed below. For fields near the stamp or watermark, extract what is visible and note any obscured characters.\n\nFor each field return:\n- value: the extracted text exactly as printed. For Arabic fields return Arabic text. For English fields return Latin text. If a digit is unclear write ? in its place.\n- confidence: a number from 0 to 100 representing how certain you are. 100 = every character clearly visible. 80 = one character uncertain. 60 = multiple characters uncertain. 0 = completely unreadable.\n- note: one specific sentence about what affected readability, or empty string if clean.\n\nFields to extract:\nplate_number, license_type, owner_id, owner_name_arabic, owner_name_english, nationality, reference_number, insurance_company, policy_number, expiry_date, chassis_vin, make, year, model, passengers, color_primary, color_secondary, weight, load_capacity, height, issue_date, card_number\n\nReturn ONLY valid JSON, no markdown, no explanation:\n{\n  'plate_number':       { 'value': '', 'confidence': 95, 'note': '' },\n  'license_type':       { 'value': '', 'confidence': 95, 'note': '' },\n  'owner_id':           { 'value': '', 'confidence': 95, 'note': '' },\n  'owner_name_arabic':  { 'value': '', 'confidence': 95, 'note': '' },\n  'owner_name_english': { 'value': '', 'confidence': 95, 'note': '' },\n  'nationality':        { 'value': '', 'confidence': 95, 'note': '' },\n  'reference_number':   { 'value': '', 'confidence': 95, 'note': '' },\n  'insurance_company':  { 'value': '', 'confidence': 95, 'note': '' },\n  'policy_number':      { 'value': '', 'confidence': 95, 'note': '' },\n  'expiry_date':        { 'value': '', 'confidence': 95, 'note': '' },\n  'chassis_vin':        { 'value': '', 'confidence': 95, 'note': '' },\n  'make':               { 'value': '', 'confidence': 95, 'note': '' },\n  'year':               { 'value': '', 'confidence': 95, 'note': '' },\n  'model':              { 'value': '', 'confidence': 95, 'note': '' },\n  'passengers':         { 'value': '', 'confidence': 95, 'note': '' },\n  'color_primary':      { 'value': '', 'confidence': 95, 'note': '' },\n  'color_secondary':    { 'value': '', 'confidence': 95, 'note': '' },\n  'weight':             { 'value': '', 'confidence': 95, 'note': '' },\n  'load_capacity':      { 'value': '', 'confidence': 95, 'note': '' },\n  'height':             { 'value': '', 'confidence': 95, 'note': '' },\n  'issue_date':         { 'value': '', 'confidence': 95, 'note': '' },\n  'card_number':        { 'value': '', 'confidence': 95, 'note': '' }\n}";

let currentFile = null;
let objectUrl = '';
let ocrData = {};
let values = {};
let scanTextTimer = null;
let toastTimer = null;

const fileInput = document.getElementById('file-input');
const imageWrap = document.getElementById('image-wrap');
const cardImg = document.getElementById('card-img');
const zoomImg = document.getElementById('zoom-img');
const miniScanImg = document.getElementById('mini-scan-img');
const fieldsEl = document.getElementById('fields');

function initialize() {
  renderEmptyFields();
  bindImageEvents();
  if (!localStorage.getItem('ocr_api_key')) {
    setTimeout(openConfig, 350);
  }
}

function bindImageEvents() {
  imageWrap.addEventListener('dragover', e => { e.preventDefault(); });
  imageWrap.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });
  cardImg.addEventListener('click', e => {
    if (!currentFile) return;
    e.stopPropagation();
    openZoom();
  });
}

function openPickerIfEmpty() {
  if (!currentFile) fileInput.click();
}

function loadFile(file) {
  if (!file.type.startsWith('image/')) {
    showToast('Please upload an image file');
    return;
  }
  if (objectUrl) URL.revokeObjectURL(objectUrl);
  objectUrl = URL.createObjectURL(file);
  currentFile = file;
  cardImg.src = objectUrl;
  zoomImg.src = objectUrl;
  miniScanImg.src = objectUrl;
  cardImg.classList.add('visible');
  imageWrap.classList.remove('empty');
  document.getElementById('drop-hint').style.display = 'none';
  document.getElementById('rescan-btn').style.display = 'inline-block';
  runOCR();
}

function getBadgeClass(conf) {
  if (conf >= 90) return 'green';
  if (conf >= 70) return 'amber';
  return 'red';
}

function renderEmptyFields() {
  ocrData = {};
  values = {};
  FIELD_DEFS.forEach(f => {
    ocrData[f.key] = { value: '', confidence: 0, note: '' };
    values[f.key] = '';
  });
  renderFields(false);
}

function renderFields(hasResult = true) {
  fieldsEl.innerHTML = '';
  FIELD_DEFS.forEach(def => {
    const data = ocrData[def.key] || { value: '', confidence: 0, note: '' };
    const confidence = Math.max(0, Math.min(100, Number(data.confidence) || 0));
    const cls = getBadgeClass(confidence);
    const row = document.createElement('div');
    row.className = 'field-row';
    row.dataset.key = def.key;
    row.dataset.confidence = String(confidence);
    row.innerHTML = `
      <span class="badge ${cls}">${confidence}%</span>
      <div class="value-wrap">
        <input class="value-input ${cls} ${cls === 'red' ? 'pulse' : ''}" data-key="${def.key}" type="text" placeholder="—" value="${escapeAttr(values[def.key] || '')}">
      </div>
      <span class="field-label">${def.ar}</span>
      <button class="copy-btn" data-key="${def.key}" title="Copy">⎘</button>
    `;
    fieldsEl.appendChild(row);
  });

  fieldsEl.querySelectorAll('.value-input').forEach(input => {
    input.addEventListener('input', e => {
      values[e.target.dataset.key] = e.target.value;
      updateProgress();
    });
  });
  fieldsEl.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => copyField(btn));
  });

  updateProgress();
  if (hasResult) scrollToFirstBelow90();
}

function updateProgress() {
  const filled = FIELD_DEFS.filter(f => (values[f.key] || '').trim().length > 0).length;
  document.getElementById('progress-text').textContent = `${filled}/22 fields extracted`;
}

function scrollToFirstBelow90() {
  const first = [...fieldsEl.querySelectorAll('.field-row')]
    .find(r => Number(r.dataset.confidence || 0) < 90);
  if (!first) return;
  first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  first.classList.add('flash');
  setTimeout(() => first.classList.remove('flash'), 1100);
}

function copyField(btn) {
  const key = btn.dataset.key;
  const val = values[key] || '';
  navigator.clipboard.writeText(val).then(() => {
    btn.classList.add('copied');
    showToast('Copied');
    setTimeout(() => btn.classList.remove('copied'), 900);
  });
}

function copyAll() {
  const text = FIELD_DEFS.map(f => `${f.ar}: ${values[f.key] || ''}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('All fields copied'));
}

function exportCSV() {
  const headers = FIELD_DEFS.map(f => `"${f.key}"`).join(',');
  const row = FIELD_DEFS.map(f => `"${(values[f.key] || '').replace(/"/g, '""')}"`).join(',');
  const csv = `${headers}\n${row}`;
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `reg_card_${Date.now()}.csv`;
  a.click();
  showToast('CSV exported');
}

async function runOCR() {
  if (!currentFile) {
    fileInput.click();
    return;
  }
  const key = localStorage.getItem('ocr_api_key');
  if (!key) {
    openConfig();
    return;
  }
  showScanOverlay(true);
  try {
    const processed = await preprocessImage(currentFile);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: processed } },
            { type: 'text', text: OCR_PROMPT }
          ]
        }]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const parsed = parseClaudeJSON(text);
    mapParsed(parsed);
    renderFields(true);
  } catch (err) {
    showToast(err.message || 'Scan failed');
  } finally {
    showScanOverlay(false);
  }
}

function showScanOverlay(show) {
  const overlay = document.getElementById('scan-overlay');
  if (!show) {
    overlay.classList.remove('active');
    clearInterval(scanTextTimer);
    scanTextTimer = null;
    return;
  }
  overlay.classList.add('active');
  const textEl = document.getElementById('scan-text');
  textEl.textContent = 'Reading document...';
  const msgs = ['Enhancing image...', 'Extracting fields...', 'Checking confidence...'];
  let i = 0;
  setTimeout(() => {
    scanTextTimer = setInterval(() => {
      textEl.textContent = msgs[i % msgs.length];
      i += 1;
    }, 1400);
  }, 2000);
}

function parseClaudeJSON(raw) {
  let cleaned = (raw || '').trim().replace(/```json|```/g, '');
  cleaned = cleaned.replace(/'([^']+)'\s*:/g, '"$1":').replace(/:\s*'([^']*)'/g, ': "$1"');
  try {
    return JSON.parse(cleaned);
  } catch {
    throw new Error('Could not parse OCR response');
  }
}

function mapParsed(parsed) {
  FIELD_DEFS.forEach(f => {
    const v = parsed?.[f.key] || {};
    const val = typeof v.value === 'string' ? v.value : '';
    const conf = Number(v.confidence);
    const confidence = Number.isFinite(conf) ? Math.max(0, Math.min(100, conf)) : (val ? 80 : 0);
    const note = typeof v.note === 'string' ? v.note : '';
    ocrData[f.key] = { value: val, confidence, note };
    values[f.key] = val;
  });
}

function preprocessImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const baseW = img.naturalWidth || img.width;
      const baseH = img.naturalHeight || img.height;
      const targetW = Math.max(baseW * 2, 2000);
      const scale = targetW / baseW;
      const targetH = Math.round(baseH * scale);

      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        reject(new Error('Canvas unavailable'));
        return;
      }

      ctx.filter = 'contrast(130%) brightness(110%)';
      ctx.drawImage(img, 0, 0, targetW, targetH);
      ctx.filter = 'none';

      const src = ctx.getImageData(0, 0, targetW, targetH);
      const out = ctx.createImageData(targetW, targetH);
      const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
      const side = 3;
      const half = 1;
      for (let y = 0; y < targetH; y++) {
        for (let x = 0; x < targetW; x++) {
          const dstOff = (y * targetW + x) * 4;
          let r = 0, g = 0, b = 0;
          for (let ky = 0; ky < side; ky++) {
            for (let kx = 0; kx < side; kx++) {
              const px = Math.min(targetW - 1, Math.max(0, x + kx - half));
              const py = Math.min(targetH - 1, Math.max(0, y + ky - half));
              const srcOff = (py * targetW + px) * 4;
              const wt = kernel[ky * side + kx];
              r += src.data[srcOff] * wt;
              g += src.data[srcOff + 1] * wt;
              b += src.data[srcOff + 2] * wt;
            }
          }
          out.data[dstOff] = Math.max(0, Math.min(255, r));
          out.data[dstOff + 1] = Math.max(0, Math.min(255, g));
          out.data[dstOff + 2] = Math.max(0, Math.min(255, b));
          out.data[dstOff + 3] = src.data[dstOff + 3];
        }
      }
      ctx.putImageData(out, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const b64 = dataUrl.split(',')[1] || '';
      resolve(b64);
    };
    img.onerror = () => reject(new Error('Unable to preprocess image'));
    img.src = URL.createObjectURL(file);
  });
}

function newScan() {
  currentFile = null;
  if (objectUrl) URL.revokeObjectURL(objectUrl);
  objectUrl = '';
  cardImg.src = '';
  zoomImg.src = '';
  miniScanImg.src = '';
  cardImg.classList.remove('visible');
  imageWrap.classList.add('empty');
  document.getElementById('drop-hint').style.display = 'block';
  document.getElementById('rescan-btn').style.display = 'none';
  fileInput.value = '';
  renderEmptyFields();
}

function openZoom() {
  if (!currentFile) return;
  document.getElementById('zoom-overlay').classList.add('open');
}
function closeZoom() {
  document.getElementById('zoom-overlay').classList.remove('open');
}
function closeZoomIfOverlay(e) {
  if (e.target.id === 'zoom-overlay') closeZoom();
}

function openConfig() {
  document.getElementById('api-key').value = localStorage.getItem('ocr_api_key') || '';
  document.getElementById('config-modal').classList.add('open');
}
function closeConfig() {
  document.getElementById('config-modal').classList.remove('open');
}
function saveConfig() {
  const val = document.getElementById('api-key').value.trim();
  if (!val.startsWith('sk-ant-')) {
    showToast('Key must start with sk-ant-');
    return;
  }
  localStorage.setItem('ocr_api_key', val);
  closeConfig();
  showToast('API key saved');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

function escapeAttr(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeZoom();
    closeConfig();
  }
});

initialize();
</script>
